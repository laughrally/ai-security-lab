<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワード設定 | AI Security Lab</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .card { background: #fff; border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .logo { font-size: 15px; font-weight: 700; color: #dc2626; letter-spacing: 0.05em; margin-bottom: 8px; }
  .logo span { color: #999; }
  h1 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 6px; }
  .sub { font-size: 13px; color: #666; margin-bottom: 28px; line-height: 1.6; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #444; margin-bottom: 6px; }
  .field input { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; transition: border-color .15s; }
  .field input:focus { border-color: #dc2626; }
  .btn { width: 100%; padding: 12px; background: #dc2626; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .15s; margin-top: 4px; }
  .btn:hover { background: #b91c1c; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .msg { display: none; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
  .msg.error   { display: block; background: #fee2e2; color: #b91c1c; }
  .msg.success { display: block; background: #dcfce7; color: #15803d; }
  .back { text-align: center; margin-top: 16px; }
  .back a { color: #dc2626; font-size: 13px; text-decoration: none; }
  .back a:hover { text-decoration: underline; }
  .loading { text-align: center; color: #666; font-size: 14px; padding: 20px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">AI<span>Security</span>Lab</div>

  <div id="view-loading"><p class="loading">読み込み中...</p></div>

  <!-- 送信フォーム（直接アクセス時） -->
  <div id="view-send" style="display:none">
    <h1>パスワードの再設定</h1>
    <p class="sub">登録済みのメールアドレスを入力してください。<br>パスワード再設定用のリンクをお送りします。</p>
    <div class="msg" id="msg-send"></div>
    <div class="field">
      <label>メールアドレス</label>
      <input type="email" id="reset-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <button class="btn" id="btn-send" onclick="sendReset()">リセットメールを送信</button>
    <div class="back"><a href="/">ログインに戻る</a></div>
  </div>

  <!-- 送信完了 -->
  <div id="view-sent" style="display:none">
    <h1>📧 メールを送信しました</h1>
    <p class="sub" style="margin-top:8px">メール内のリンクをクリックして<br>パスワードを設定してください。</p>
    <div class="back" style="margin-top:24px"><a href="/">サイトに戻る</a></div>
  </div>

  <!-- 新PW設定フォーム（リセットリンクから） -->
  <div id="view-form" style="display:none">
    <h1>新しいパスワードを設定</h1>
    <p class="sub">6文字以上のパスワードを設定してください。</p>
    <div class="msg" id="msg-form"></div>
    <div class="field">
      <label>新しいパスワード（6文字以上）</label>
      <input type="password" id="pw1" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="field">
      <label>パスワード確認</label>
      <input type="password" id="pw2" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn" id="btn-form" onclick="updatePw()">パスワードを設定する</button>
  </div>

  <!-- 設定完了 -->
  <div id="view-done" style="display:none">
    <h1>✅ 設定完了</h1>
    <p class="sub" style="margin-top:8px">パスワードを更新しました。<br>新しいパスワードでログインしてください。</p>
    <div class="back" style="margin-top:24px"><a href="/">ログイン画面へ</a></div>
  </div>

  <!-- リンク切れ -->
  <div id="view-error" style="display:none">
    <h1>リンクが無効です</h1>
    <p class="sub" style="margin-top:8px">このリンクは期限切れか、すでに使用済みです。<br>もう一度パスワードリセットを行ってください。</p>
    <div class="back" style="margin-top:24px"><a href="/reset-password.html">再設定ページへ</a></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const sb = createClient(
  'https://qsvkzhozklgczsdpbgnd.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFzdmt6aG96a2xnY3pzZHBiZ25kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NjA3MzQsImV4cCI6MjA5MTEzNjczNH0.22JKU3r41qcx_bw-F8CLXC3u0rwIGzdAmnrMjcjRBhA'
);

const views = ['view-loading','view-send','view-sent','view-form','view-done','view-error'];
function show(id) {
  views.forEach(v => document.getElementById(v).style.display = v === id ? 'block' : 'none');
}
function setMsg(id, type, text) {
  const el = document.getElementById(id);
  el.className = 'msg ' + type;
  el.textContent = text;
}

const hash = window.location.hash;
if (hash && hash.includes('access_token')) {
  const params        = new URLSearchParams(hash.substring(1));
  const access_token  = params.get('access_token');
  const refresh_token = params.get('refresh_token');
  const type          = params.get('type');
  if (type === 'recovery' && access_token) {
    const { error } = await sb.auth.setSession({ access_token, refresh_token });
    if (error) { show('view-error'); }
    else { history.replaceState(null, '', window.location.pathname); show('view-form'); }
  } else {
    show('view-error');
  }
} else {
  show('view-send');
}

window.sendReset = async function() {
  const email = document.getElementById('reset-email').value.trim();
  if (!email) { setMsg('msg-send', 'error', 'メールアドレスを入力してください。'); return; }
  const btn = document.getElementById('btn-send');
  btn.disabled = true; btn.textContent = '送信中...';
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://ai-security-lab.com/reset-password.html'
  });
  if (error) {
    setMsg('msg-send', 'error', '送信に失敗しました。メールアドレスをご確認ください。');
    btn.disabled = false; btn.textContent = 'リセットメールを送信';
  } else {
    show('view-sent');
  }
};

window.updatePw = async function() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  if (!pw1 || !pw2) { setMsg('msg-form', 'error', 'パスワードを入力してください。'); return; }
  if (pw1.length < 6) { setMsg('msg-form', 'error', 'パスワードは6文字以上で設定してください。'); return; }
  if (pw1 !== pw2) { setMsg('msg-form', 'error', 'パスワードが一致しません。'); return; }
  const btn = document.getElementById('btn-form');
  btn.disabled = true; btn.textContent = '更新中...';
  const { error } = await sb.auth.updateUser({ password: pw1 });
  if (error) {
    setMsg('msg-form', 'error', '更新に失敗しました。もう一度お試しください。');
    btn.disabled = false; btn.textContent = 'パスワードを設定する';
  } else {
    show('view-done');
  }
};
</script>
</body>
</html>
